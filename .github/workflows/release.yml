name: Build & Release

# Chạy khi push một tag phiên bản (vd: v1.0.2). Commit thường KHÔNG kích hoạt.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # cần để tạo Release + upload file

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller AutoVisionClicker.spec --noconfirm --clean

      - name: Rename with version
        run: Copy-Item dist/AutoCatchPokemonPGSharp.exe "dist/AutoCatchPokemonPGSharp-${{ github.ref_name }}.exe"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.ref_name }}
          "dist/AutoCatchPokemonPGSharp-${{ github.ref_name }}.exe"
          --title ${{ github.ref_name }}
          --notes-file RELEASE_NOTES.md

      - name: Notify Discord about the new release
        continue-on-error: true
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AutoCatchPokemonPGSharp-${{ github.ref_name }}.exe
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DISCORD_WEBHOOK_URL)) {
            Write-Warning "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          }

          $embed = @{
            title       = "Auto Catch Pokemon PGSharp $($env:RELEASE_VERSION)"
            description = "Bản cập nhật mới đã sẵn sàng. Tải file EXE mới và thay thế bản cũ; không cần cài đặt lại."
            url         = $env:RELEASE_URL
            color       = 5763719
            fields      = @(
              @{
                name   = "Tải bản cập nhật"
                value  = "[AutoCatchPokemonPGSharp-$($env:RELEASE_VERSION).exe]($($env:DOWNLOAD_URL))"
                inline = $false
              },
              @{
                name   = "Chi tiết thay đổi"
                value  = "[Xem release notes trên GitHub]($($env:RELEASE_URL))"
                inline = $false
              }
            )
            footer      = @{ text = "Auto Catch Pokemon PGSharp" }
            timestamp   = (Get-Date).ToUniversalTime().ToString("o")
          }
          $payload = @{
            username = "Auto Catch Update"
            embeds   = @($embed)
          } | ConvertTo-Json -Depth 6

          Invoke-RestMethod `
            -Uri $env:DISCORD_WEBHOOK_URL `
            -Method Post `
            -ContentType "application/json; charset=utf-8" `
            -Body ([Text.Encoding]::UTF8.GetBytes($payload))
